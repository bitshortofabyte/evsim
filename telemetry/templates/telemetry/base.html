<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EV Telemetry{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1b2430;
            --muted: #5b6678;
            --border: #d8dfeb;
            --primary: #1769e0;
            --danger: #b42318;
            --danger-bg: #fef3f2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .layout {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .muted {
            color: var(--muted);
            margin-top: 6px;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
        }

        .stack {
            display: grid;
            gap: 10px;
        }

        .badge-danger {
            display: inline-block;
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #fecdca;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            padding: 6px 10px;
            cursor: pointer;
        }

        .btn-danger {
            border-color: #fda29b;
            color: #912018;
            background: #fff5f4;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <main class="layout">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
