<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tools</title>
</head>
<body>
    <h1>Admin Tools</h1>
    <p><a href="{% url 'dashboard' %}">Back to dashboard</a></p>

    {% if admin_message %}
        <p>{{ admin_message }}</p>
    {% endif %}

    {% if mongo_error %}
        <p>MongoDB error: {{ mongo_error }}</p>
    {% else %}
        <p>Current telemetry record count: {{ total_documents }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <button type="submit">Clear all telemetry records</button>
    </form>
</body>
</html>
